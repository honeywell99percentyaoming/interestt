<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบคำนวณดอกเบี้ยและช่วยวิเคราะห์หนี้</title>

<style>
    body {
        font-family: "TH Sarabun New", Arial, sans-serif;
        background-color: #f5f7fa;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 900px;
        margin: 30px auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #003366;
    }

    h2 {
        color: #003366;
        border-bottom: 2px solid #003366;
        padding-bottom: 5px;
    }

    label {
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin: 5px 0 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        background-color: #003366;
        color: white;
        border: none;
        padding: 10px 15px;
        margin: 5px 3px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0055aa;
    }

    .result {
        margin-top: 15px;
        padding: 10px;
        background: #eef3ff;
        border-left: 5px solid #003366;
    }

    .help-box {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        background: #fafafa;
        border-radius: 8px;
    }

    .section {
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
<h1>ระบบคำนวณดอกเบี้ยและช่วยวิเคราะห์หนี้</h1>

<h2>ส่วนที่ 1: คำนวณดอกเบี้ย</h2>

<label>เงินต้น (บาท)</label>
<input type="number" id="principal">

<label>อัตราดอกเบี้ย (% ต่อปี)</label>
<input type="number" id="rate">

<label>จำนวนวันค้างชำระ</label>
<input type="number" id="days">

<button onclick="calculate()">คำนวณ</button>

<div id="result" class="result"></div>

<h2>ส่วนที่ 2: ระบบช่วยวิเคราะห์ทางกฎหมาย</h2>

<button onclick="toggleHelp()">📘 เปิด/ปิด คำแนะนำ</button>

<div id="helpBox" class="help-box" style="display:none;">
    <b>เลือกประเด็นกฎหมาย</b><br><br>

    <button onclick="startCase(1)">1. ลูกหนี้ไม่ชำระหนี้</button>
    <button onclick="startCase(2)">2. เหตุการณ์หลังสัญญา</button>
    <button onclick="startCase(3)">3. การละเลยไม่ชำระหนี้</button>
    <button onclick="startCase(4)">4. หนี้พ้นวิสัย</button>
    <button onclick="startCase(5)">5. การชำระล่าช้า</button>

    <div id="helpContent" class="section"></div>
</div>

</div>

<script>
// ===== คำนวณดอกเบี้ย =====
function calculate() {
    let p = parseFloat(document.getElementById('principal').value);
    let r = parseFloat(document.getElementById('rate').value);
    let d = parseFloat(document.getElementById('days').value);

    if (!p || !r || !d) {
        document.getElementById('result').innerHTML = "กรุณากรอกข้อมูลให้ครบถ้วน";
        return;
    }

    let interest = p * (r/100) * (d/365);
    let total = p + interest;

    document.getElementById('result').innerHTML =
        "ดอกเบี้ย = " + interest.toFixed(2) + " บาท<br>" +
        "รวม = " + total.toFixed(2) + " บาท";
}

// ===== เปิด/ปิด help =====
function toggleHelp() {
    let box = document.getElementById('helpBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

// ===== logic กฎหมาย =====
function startCase(type) {
    let c = document.getElementById('helpContent');

    if (type === 1) {
        c.innerHTML = `
        <b>ลูกหนี้ไม่ชำระหนี้ (หนี้เงิน)</b><br>
        ลูกหนี้ไม่ชำระเงิน หรือชำระไม่ครบ<br><br>

        หนี้ยังคงอยู่หรือไม่?<br>
        <button onclick="next1(true)">ใช่</button>
        <button onclick="next1(false)">ไม่ใช่</button>
        `;
    }

    if (type === 2) {
        c.innerHTML = `
        <b>เหตุการณ์หลังสัญญา</b><br>
        เป็นเหตุสุดวิสัยหรือไม่?<br>
        <button onclick="force(true)">ใช่</button>
        <button onclick="force(false)">ไม่ใช่</button>
        `;
    }

    if (type === 3) {
        c.innerHTML = `
        <b>การละเลยไม่ชำระหนี้</b><br>
        - ลูกหนี้ผิดนัด (มาตรา 204)<br>
        - ต้องเสียดอกเบี้ย (มาตรา 224)<br>
        - เรียกค่าเสียหายได้
        `;
    }

    if (type === 4) {
        c.innerHTML = `
        <b>หนี้พ้นวิสัย</b><br>
        เป็นความผิดของลูกหนี้หรือไม่?<br>
        <button onclick="fault(true)">เป็น</button>
        <button onclick="fault(false)">ไม่เป็น</button>
        `;
    }

    if (type === 5) {
        c.innerHTML = `
        <b>การชำระล่าช้า</b><br>
        ถือเป็นการผิดนัด<br>
        - เสียดอกเบี้ยผิดนัด<br>
        - อาจต้องชดใช้ค่าเสียหาย
        `;
    }
}

function next1(status) {
    let c = document.getElementById('helpContent');
    c.innerHTML = `
    เป็นความผิดของลูกหนี้หรือไม่?<br>
    <button onclick="fault(true)">เป็น</button>
    <button onclick="fault(false)">ไม่เป็น</button>
    `;
}

function fault(f) {
    let c = document.getElementById('helpContent');

    if (f) {
        c.innerHTML = `
        ⚖️ เป็นความผิดของลูกหนี้<br>
        - ต้องชำระหนี้<br>
        - ต้องชดใช้ค่าเสียหาย<br>
        - เสียดอกเบี้ยผิดนัด
        `;
    } else {
        c.innerHTML = `
        ⚖️ ไม่เป็นความผิดของลูกหนี้<br>
        - อาจยกเว้นความรับผิด<br>
        - หากเป็นเหตุสุดวิสัย หนี้ระงับ
        `;
    }
}

function force(f) {
    let c = document.getElementById('helpContent');

    if (f) {
        c.innerHTML = "เหตุสุดวิสัย → ไม่ต้องรับผิด";
    } else {
        c.innerHTML = "ไม่ใช่เหตุสุดวิสัย → ต้องรับผิด";
    }
}
</script>

</body>
</html>
