<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณดอกเบี้ยเจ้าหนี้</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
        input, select { padding: 5px; margin: 5px 0; width: 100%; }
        button { padding: 10px 15px; margin-top: 10px; }
        .result { margin-top: 20px; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h2>โปรแกรมคำนวณดอกเบี้ยค้างชำระ</h2>

    <label for="rateType">คำนวณดอกเบี้ยต่อ:</label>
    <select id="rateType">
        <option value="ปี">ปี</option>
        <option value="เดือน">เดือน</option>
    </select>

    <label for="principal">เงินต้น (บาท):</label>
    <input type="number" id="principal" min="0">

    <label for="rate">อัตราดอกเบี้ย (% ต่อปีหรือเดือน):</label>
    <input type="number" id="rate" min="0" step="0.01">

    <label for="period">จำนวน<span id="periodLabel">วัน</span>ที่ค้าง:</label>
    <input type="number" id="period" min="0">

    <button onclick="calculateInterest()">คำนวณดอกเบี้ย</button>

    <div id="result" class="result"></div>

    <script>
        const rateTypeSelect = document.getElementById('rateType');
        const periodLabel = document.getElementById('periodLabel');

        rateTypeSelect.addEventListener('change', () => {
            periodLabel.textContent = rateTypeSelect.value === 'ปี' ? 'วัน' : 'เดือน';
        });

        function calculateInterest() {
            const rateType = rateTypeSelect.value;
            const principal = parseFloat(document.getElementById('principal').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const periodAmount = parseInt(document.getElementById('period').value);
            const resultDiv = document.getElementById('result');

            if (isNaN(principal) || isNaN(rate) || isNaN(periodAmount)) {
                resultDiv.innerHTML = '<span class="error">กรุณาใส่ตัวเลขให้ถูกต้องทุกช่อง</span>';
                return;
            }

            if (rateType === 'ปี' && rate > 15) {
                resultDiv.innerHTML = '<span class="error">❌ ผิดกฎหมาย! อัตราดอกเบี้ยเกิน 15% ต่อปี</span>';
                return;
            } else if (rateType === 'เดือน' && rate > 1.25) {
                resultDiv.innerHTML = '<span class="error">❌ ผิดกฎหมาย! อัตราดอกเบี้ยเกิน 1.25% ต่อเดือน</span>';
                return;
            }

            let interest = 0;
            if (rateType === 'ปี') {
                interest = principal * (rate / 100) * (periodAmount / 365);
            } else {
                interest = principal * (rate / 100) * periodAmount;
            }

            const total = principal + interest;

            resultDiv.innerHTML = `ดอกเบี้ยค้างชำระ = ${interest.toFixed(2)} บาท<br>รวมยอดที่ต้องจ่าย = ${total.toFixed(2)} บาท`;
        }
    </script>
</body>
</html>
